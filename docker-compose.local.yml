services:
  redis:
    image: redis:7.4-alpine
    container_name: ${LOCAL_REDIS_CONTAINER_NAME:-domisa-local-redis}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${LOCAL_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-local-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    container_name: ${LOCAL_MYSQL_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${LOCAL_MYSQL_DATABASE}
      MYSQL_USER: ${LOCAL_MYSQL_USER}
      MYSQL_PASSWORD: ${LOCAL_MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${LOCAL_MYSQL_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${LOCAL_MYSQL_PORT}:3306"
    volumes:
      - mysql-local-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${LOCAL_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  domisa-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${LOCAL_BACKEND_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: local
      LOCAL_APP_DUMMY_ENABLED: ${LOCAL_APP_DUMMY_ENABLED:-false}
      LOCAL_REDIS_HOST: redis
      LOCAL_REDIS_PORT: 6379
      TZ: Asia/Seoul
    ports:
      - "${LOCAL_SERVER_PORT}:${LOCAL_SERVER_PORT}"

volumes:
  mysql-local-data:
  redis-local-data:
