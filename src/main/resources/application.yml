spring:
  application:
    name: domisa-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${SERVER_PORT:8080}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}
    upload-prefix: ${AWS_S3_UPLOAD_PREFIX:uploads}
    presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:PT10M}
