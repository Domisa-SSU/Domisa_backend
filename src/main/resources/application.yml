spring:
  application:
    name: domisa-backend

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    upload-prefix: ${AWS_S3_UPLOAD_PREFIX:uploads}
    presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:PT10M}
