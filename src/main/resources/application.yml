spring:
  application:
    name: domisa-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:mysql://${DB_URL}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        show_sql: ${JPA_SHOW_SQL:false}
        format_sql: ${JPA_FORMAT_SQL:false}

server:
  port: ${SERVER_PORT:8080}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION}
    upload-prefix: ${AWS_S3_UPLOAD_PREFIX:uploads}
    presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:PT10M}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}
  allowed-redirect-uris: ${KAKAO_ALLOWED_REDIRECT_URIS:${KAKAO_REDIRECT_URI}}

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-in-seconds: ${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS:3600}
  refresh-token-validity-in-seconds: ${JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS:604800}

app:
  frontend-url: ${FRONTEND_URL}
  auth:
    cookie:
      secure: ${APP_AUTH_COOKIE_SECURE:true}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:None}
      domain: ${APP_AUTH_COOKIE_DOMAIN:}
  profile-image:
    processing:
      fixed-delay-ms: ${PROFILE_IMAGE_FIXED_DELAY_MS:30000}
      thumbnail-size: ${PROFILE_IMAGE_THUMBNAIL_SIZE:300}
      origin-max-size: ${PROFILE_IMAGE_ORIGIN_MAX_SIZE:1080}
      thumbnail-blur-kernel-size: ${PROFILE_IMAGE_THUMBNAIL_BLUR_KERNEL_SIZE:17}
      origin-blur-kernel-size: ${PROFILE_IMAGE_ORIGIN_BLUR_KERNEL_SIZE:21}
      batch-size: ${PROFILE_IMAGE_BATCH_SIZE:10}
      max-retry-count: ${PROFILE_IMAGE_MAX_RETRY_COUNT:5}

payaction:
  base-url: ${PAYACTION_BASE_URL:https://api.payaction.app}
  api-key: ${PAYACTION_API_KEY:}
  mall-id: ${PAYACTION_MALL_ID:}
  webhook-key: ${PAYACTION_WEBHOOK_KEY:}
  deposit:
    bank-name: ${PAYACTION_DEPOSIT_BANK_NAME:국민은행}
    bank-code: ${PAYACTION_DEPOSIT_BANK_CODE:004}
    account-number: ${PAYACTION_DEPOSIT_ACCOUNT_NUMBER:}
    account-holder: ${PAYACTION_DEPOSIT_ACCOUNT_HOLDER:}
