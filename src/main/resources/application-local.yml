server:
  port: ${LOCAL_SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${LOCAL_DB_URL}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${LOCAL_DB_USERNAME}
    password: ${LOCAL_DB_PASSWORD}
  data:
    redis:
      host: ${LOCAL_REDIS_HOST:localhost}
      port: ${LOCAL_REDIS_PORT:6379}
      password: ${LOCAL_REDIS_PASSWORD:}
      timeout: ${LOCAL_REDIS_TIMEOUT:2s}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: ${LOCAL_JPA_SHOW_SQL:false}
        format_sql: ${LOCAL_JPA_FORMAT_SQL:false}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${LOCAL_KAKAO_REDIRECT_URI:http://localhost:5173/auth}
  allowed-redirect-uris: ${LOCAL_KAKAO_ALLOWED_REDIRECT_URIS:${LOCAL_KAKAO_REDIRECT_URI:http://localhost:5173/auth},${KAKAO_REDIRECT_URI:https://domisa.vercel.app/auth}}

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 604800

app:
  frontend-url: ${LOCAL_FRONTEND_URL:http://localhost:5173}
  security:
    swagger-enabled: ${LOCAL_APP_SECURITY_SWAGGER_ENABLED:true}
  blacklist:
    redis-key-prefix: ${LOCAL_APP_BLACKLIST_REDIS_KEY_PREFIX:blacklist:user:}
    not-blacklisted-cache-ttl: ${LOCAL_APP_BLACKLIST_NOT_BLACKLISTED_CACHE_TTL:PT5M}
  dummy:
    enabled: ${LOCAL_APP_DUMMY_ENABLED:true}
    admin-key: ${LOCAL_DUMMY_ADMIN_KEY:${DUMMY_ADMIN_KEY:}}
  auth:
    cookie:
      secure: ${LOCAL_APP_AUTH_COOKIE_SECURE}
      same-site: ${LOCAL_APP_AUTH_COOKIE_SAME_SITE}
      domain: ${LOCAL_APP_AUTH_COOKIE_DOMAIN:}

springdoc:
  api-docs:
    enabled: ${LOCAL_SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${LOCAL_SPRINGDOC_SWAGGER_UI_ENABLED:true}
