<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>DMS User Detail</title>
	<link rel="stylesheet" href="/dms/dms.css">
	<script defer src="/dms/dms.js"></script>
</head>
<body>
<header class="dms-header">
		<a href="/dms-room/users">유저 목록</a>
		<a href="/dms-room/orders">주문 목록</a>
		<a href="/dms-room/introductions">Introduction 목록</a>
		<a href="/dms-room/logs">서버 로그</a>
		<form method="post" action="/dms-room/logout"><button type="submit">로그아웃</button></form>
</header>

<main class="dms-page">
	<div class="dms-title-row">
		<h1>유저 상세</h1>
		<a class="dms-button" href="/dms-room/users">목록으로</a>
	</div>
	<p class="dms-alert dms-alert-info" th:if="${message}" th:text="${message}"></p>
	<p class="dms-alert dms-alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></p>

	<section class="dms-panel dms-panel-compact">
		<h2>쿠키 관리</h2>
		<div class="dms-cookie-forms">
			<form method="post" th:action="@{/dms-room/users/{id}/cookies/add(id=${user.id})}" class="dms-form">
				<input type="number" name="amount" min="1" placeholder="지급 수량" required>
				<input type="text" name="reason" maxlength="60" placeholder="사유">
				<button type="submit" class="dms-button dms-button-primary">쿠키 지급</button>
			</form>
			<form method="post" th:action="@{/dms-room/users/{id}/cookies/subtract(id=${user.id})}" class="dms-form" data-confirm="쿠키를 차감할까요?">
				<input type="number" name="amount" min="1" placeholder="차감 수량" required>
				<input type="text" name="reason" maxlength="60" placeholder="사유">
				<button type="submit" class="dms-button dms-button-danger">쿠키 차감</button>
			</form>
		</div>
	</section>

	<section class="dms-panel" th:if="${user.profileImageUrl != null}">
		<h2>프로필 사진</h2>
		<a class="dms-profile-photo" th:href="${user.profileImageUrl}" target="_blank">
			<img th:src="${user.profileImageUrl}" alt="프로필 사진">
		</a>
	</section>

	<section class="dms-panel">
		<h2>기본 정보</h2>
		<table class="dms-detail-table">
			<tr><th>id</th><td th:text="${user.id}"></td></tr>
			<tr><th>publicId</th><td th:text="${user.publicId}"></td></tr>
			<tr><th>카카오ID</th><td th:text="${user.kakaoId}"></td></tr>
			<tr><th>이름</th><td th:text="${user.name}"></td></tr>
			<tr><th>닉네임</th><td th:text="${user.nickname}"></td></tr>
			<tr><th>성별</th><td th:text="${user.gender}"></td></tr>
			<tr><th>출생년도</th><td th:text="${user.birthYear}"></td></tr>
			<tr><th>나이</th><td th:text="${user.age}"></td></tr>
			<tr><th>동물프로필</th><td th:text="${user.animalProfile}"></td></tr>
			<tr><th>보유 쿠키</th><td th:text="${user.cookies}"></td></tr>
			<tr><th>연락처 유형</th><td th:text="${user.contactType}"></td></tr>
			<tr><th>연락처</th><td th:text="${user.contact}"></td></tr>
			<tr><th>초대 코드</th><td th:text="${user.inviteCode == null or user.inviteCode == '' ? '-' : user.inviteCode}"></td></tr>
			<tr><th>가입 완료 여부</th><td th:text="${user.isRegistered}"></td></tr>
			<tr><th>소개서 등록 여부</th><td th:text="${user.hasIntroduction}"></td></tr>
			<tr><th>프로필 완성 여부</th><td th:text="${user.isProfileCompleted}"></td></tr>
			<tr><th>알림 전화번호</th><td th:text="${user.notificationPhone}"></td></tr>
			<tr><th>무료 호감권 수</th><td th:text="${user.freeLikeCount}"></td></tr>
			<tr><th>학생증</th><td><span th:text="${user.studentCardKey}"></span> <a th:if="${user.hasStudentCard()}" th:href="@{/dms-room/users/{id}/student-card(id=${user.id})}" target="_blank">보기</a></td></tr>
			<tr><th>검수 여부</th><td th:text="${user.isChecked}"></td></tr>
			<tr><th>차단 여부</th><td th:text="${user.blacklisted}"></td></tr>
			<tr><th>다음 새로고침 가능 시간</th><td th:text="${user.refreshAvailableAt}"></td></tr>
			<tr><th>가입일</th><td th:text="${user.createdAt}"></td></tr>
			<tr><th>수정일</th><td th:text="${user.updatedAt}"></td></tr>
			<tr><th>블러 해제한 유저</th><td th:text="${user.myBlurs}"></td></tr>
			<tr><th>받은 호감</th><td th:text="${user.myFans}"></td></tr>
			<tr><th>보낸 호감</th><td th:text="${user.myTypes}"></td></tr>
			<tr><th>매칭된 유저</th><td th:text="${user.myMatches}"></td></tr>
			<tr><th>현재 노출 중인 유저</th><td th:text="${user.nowShows}"></td></tr>
		</table>
	</section>
</main>
</body>
</html>
