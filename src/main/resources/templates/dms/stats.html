<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>DMS Stats</title>
	<link rel="stylesheet" href="/dms/dms.css">
	<script defer src="/dms/dms.js"></script>
</head>
<body>
<header class="dms-header">
	<a href="/dms-room/users">유저 목록</a>
	<a href="/dms-room/users/completed">완료 유저 목록</a>
	<a href="/dms-room/orders">주문 목록</a>
	<a href="/dms-room/stats">통계</a>
	<a href="/dms-room/introductions">Introduction 목록</a>
	<a href="/dms-room/logs">서버 로그</a>
	<form method="post" action="/dms-room/logout"><button type="submit">로그아웃</button></form>
</header>

<main class="dms-page">
	<h1>DMS 통계</h1>
	<p class="dms-muted">각 일차는 08:00부터 다음날 08:00까지입니다.</p>

	<div class="dms-stats-day-grid">
		<section class="dms-panel" th:each="day : ${page.days}">
			<h2 th:text="${day.label}"></h2>
			<p class="dms-muted" th:text="${day.rangeText}"></p>

			<div class="dms-stats">
				<div><span>완료 유저(남)</span><strong th:text="${day.completedMaleUsers}">0</strong></div>
				<div><span>완료 유저(여)</span><strong th:text="${day.completedFemaleUsers}">0</strong></div>
				<div><span>완료 유저(총)</span><strong th:text="${day.completedTotalUsers}">0</strong></div>
				<div><span>완료 주문 수</span><strong th:text="${day.completedOrderCount}">0</strong></div>
				<div><span>완료 주문 금액</span><strong th:text="${day.completedOrderAmount}">0</strong></div>
			</div>

			<table class="dms-table">
				<thead>
				<tr>
					<th>CookieCode</th>
					<th>완료 주문 수</th>
				</tr>
				</thead>
				<tbody>
				<tr th:each="code : ${day.orderCodeStats}">
					<td th:text="${code.cookieCode + '(' + code.unitDescription + ')'}"></td>
					<td th:text="${code.completedOrderCount}"></td>
				</tr>
				</tbody>
			</table>
		</section>
	</div>
</main>
</body>
</html>
